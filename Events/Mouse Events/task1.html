<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-color: blueviolet;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        div{
            background-color: black;
            height: 400px;
            width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-style: solid;
            border-color: brown;
            border-width: 20px;
            font-size: 300px;
            text-align: center;
            margin-bottom: 29px;
        }
        #treasure-chest{
            font-size: 300px;
            text-align: center;
            margin-bottom: 29px;
            
        }

    </style>
</head>
<body>
    <div id="tc">
         <p id="treasure-chest">📦</p>
    </div>
   
    <script>

       const chest = document.getElementById("tc");
       chest.onmouseenter = function(e){
            e.target.textContent = "💎";
            e.target.style.backgroundColor = "gold";
       }

       chest.onmouseleave = function(e){
            e.target.textContent = "📦";
            e.target.style.backgroundColor = "black";
       }

    </script>
</body>
</html>
